<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191410"/>
      <stop offset="1" stop-color="#120E0A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- faint frame -->
  <rect x="24" y="24" width="1152" height="582" rx="18" fill="none" stroke="#2A2219" stroke-width="2"/>

  <!-- eyebrow -->
  <text x="112" y="186" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700"
        letter-spacing="8" fill="#5B7CFA">AVALANCHE&#160;FUJI</text>

  <!-- gate mark (64x64 geometry) scaled to 132px at (112, 214) -->
  <g transform="translate(112,214) scale(2.0625)">
    <polygon points="32,8 54,20 54,44 32,56 10,44 10,20" fill="none" stroke="#F0E9DD" stroke-width="4" stroke-linejoin="round"/>
    <rect x="29" y="22" width="6" height="20" fill="#F0E9DD" rx="2"/>
    <line x1="2" y1="32" x2="18" y2="32" stroke="#5B7CFA" stroke-width="4" stroke-dasharray="4 3" stroke-linecap="round"/>
    <line x1="46" y1="32" x2="58" y2="32" stroke="#5B7CFA" stroke-width="5" stroke-linecap="round"/>
    <polygon points="62,32 56,28 56,36" fill="#5B7CFA"/>
  </g>

  <!-- wordmark -->
  <text x="280" y="330" font-family="Helvetica, Arial, sans-serif" font-size="150" font-weight="700"
        letter-spacing="2" fill="#F0E9DD">WARD</text>

  <!-- tagline -->
  <text x="114" y="430" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="500" fill="#CFC6B8">
    On-chain policy gate for autonomous agents.
  </text>
  <text x="114" y="484" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="500" fill="#CFC6B8">
