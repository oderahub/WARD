<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0B1220"/>
  <!-- Hexagonal gate -->
  <polygon points="32,8 54,20 54,44 32,56 10,44 10,20"
           fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner column -->
  <rect x="29" y="22" width="6" height="20" fill="#FFFFFF" rx="2"/>
  <!-- Arrow piercing through (blue accent) -->
  <line x1="2" y1="32" x2="18" y2="32" stroke="#3B82F6" stroke-width="4"
        stroke-dasharray="4 3" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="58" y2="32" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"/>
  <polygon points="62,32 56,28 56,36" fill="#3B82F6"/>
</svg>
