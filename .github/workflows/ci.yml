name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge:
    name: forge build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: forge version
        run: forge --version

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv

      - name: forge coverage (informational)
        run: forge coverage --report summary || true
