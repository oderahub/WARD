[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true

# Symlinks `lib/` → `../../contracts/lib` and `sentry-src/` → `../../contracts/src`
# expose forge-std + the live Sentry sources without copying. We never deploy
# the Sentry contracts from this sub-project — we just import the Intent
# struct + SentryOracle interface and reference the live Shannon address.
remappings = [
    "sentry-somnia/=sentry-src/",
    "forge-std/=lib/forge-std/src/",
]

fs_permissions = [{ access = "write", path = "deployments/"}]
