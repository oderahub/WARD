[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = ["forge-std/=lib/forge-std/src/"]
fs_permissions = [{ access = "read", path = "./"}, { access = "write", path = "deployments/"}, { access = "write", path = "../sdk/tests/fixtures/"}]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[invariant]
runs = 256
depth = 25
fail_on_revert = false
call_override = false

[rpc_endpoints]
# Avalanche Fuji C-Chain testnet (chainId 43113). Deploy with:
#   forge script script/Deploy.s.sol --rpc-url avalanche_fuji --broadcast
avalanche_fuji = "https://api.avax-test.network/ext/bc/C/rpc"
# Avalanche C-Chain mainnet (chainId 43114).
avalanche = "https://api.avax.network/ext/bc/C/rpc"

[etherscan]
# Snowtrace migrated to Routescan; these etherscan-compatible endpoints verify
# on Avalanche. SNOWTRACE_API_KEY may be any non-empty string for Routescan.
avalanche_fuji = { key = "${SNOWTRACE_API_KEY}", chain = 43113, url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }
avalanche = { key = "${SNOWTRACE_API_KEY}", chain = 43114, url = "https://api.routescan.io/v2/network/mainnet/evm/43114/etherscan" }
